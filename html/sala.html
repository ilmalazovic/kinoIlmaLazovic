<!DOCTYPE html>

<body>

    <header>
        <nav id="meni">
            <div class="brand">Kino sala</div>

                <li><a href="#">Raspored</a></li>
                <li><a href="sala.html">Sala</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="info">
            <div class="info-stavka">
                <span class="info-label">Film:</span>
                <span class="info-vrijednost" data-film>Svadba</span>
            </div>
            <div class="info-stavka">
                <span class="info-label">Dan i datum:</span>
                <span class="info-vrijednost">Ponedjeljak, 04.03.</span>
            </div>
            <div class="info-stavka">
                <span class="info-label">Vrijeme:</span>
                <span class="info-vrijednost" data-vrijeme>16:00</span>
            </div>
            <div class="info-stavka">
                <span class="info-label">Sala:</span>
                <span class="info-vrijednost">Sala 1</span>
            </div>
        </div>

        <div class="platno-wrapper">
            <div class="platno">PLATNO</div>
        </div>

        <div class="sala-wrapper">
            <div class="sala" id="sala"></div>
        </div>

        <div class="navigacija-projekcija">
            <button id="btn-prethodna">&#8592; Prethodna</button>
            <button id="btn-sljedeca">Sljedeća &#8594;</button>
        </div>

        <div class="legenda">
            <div class="legenda-stavka">
                <div class="legenda-boja slobodno-boja"></div>
                <span>Dostupno</span>
            </div>
            <div class="legenda-stavka">
                <div class="legenda-boja zauzeto-boja"></div>
                <span>Zauzeto</span>
            </div>
            <div class="legenda-stavka">
                <div class="legenda-boja rezervisano-boja"></div>
                <span>Rezervisano</span>
            </div>
        </div>

    </main>

    <footer>
        <div class="footer-sadrzaj">
            <div class="footer-kolona">
                <h4>Navigacija</h4>
                <ul>
                    <li><a href="filmovi.html">Filmovi</a></li>
                    <li><a href="#">Raspored</a></li>
                    <li><a href="sala.html">Sala</a></li>

            </div>
            <div class="footer-kolona">
                <h4>Kontakt informacije</h4>
                <p>Email: ...</p>
